name: zephyr-xtensa-espressif-esp32s3
adopt-info: toolchain
build-base: ubuntu@24.04
summary: Zephyr Toolchain
description: |
  This SDK provides the Xtensa cross-compiler toolchain for building Zephyr
  firmware targeting the xtensa-espressif_esp32s3_zephyr-elf target triple.
  Use this SDK alongside the zephyr base SDK.
license: Apache-2.0
website: https://github.com/canonical/zephyr-xtensa-espressif-esp32s3-sdk
platforms:
  amd64:

slots:
  toolchain:
    interface: mount
    workshop-source: $SDK
parts:
  toolchain:
    plugin: dump
    source: .
    override-pull: |
      VERSION=$(cat "$CRAFT_PROJECT_DIR/VERSION")
      craftctl set version="$VERSION"
      curl -fLO "https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${VERSION}/toolchain_linux-x86_64_xtensa-espressif_esp32s3_zephyr-elf.tar.xz"
      tar -xf "toolchain_linux-x86_64_xtensa-espressif_esp32s3_zephyr-elf.tar.xz" --strip-components=1 -C "$CRAFT_PART_SRC"
      rm -f "toolchain_linux-x86_64_xtensa-espressif_esp32s3_zephyr-elf.tar.xz"
