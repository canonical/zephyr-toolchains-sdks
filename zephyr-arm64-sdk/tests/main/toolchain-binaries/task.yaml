summary: Verify aarch64-zephyr-elf cross-compiler binaries are present in the SDK

prepare: |
  envsubst '${BASE}' <workshop.yaml.in >workshop.yaml
  workshop launch

restore: |
  workshop remove || true

execute: |
  workshop exec -- test -x /var/lib/workshop/sdk/zephyr-arm64/bin/aarch64-zephyr-elf-gcc
  workshop exec -- test -x /var/lib/workshop/sdk/zephyr-arm64/bin/aarch64-zephyr-elf-ld
  workshop exec -- /var/lib/workshop/sdk/zephyr-arm64/bin/aarch64-zephyr-elf-gcc --version

debug: |
  workshop exec -- ls /var/lib/workshop/sdk/zephyr-arm64/bin/ | head -20 || true
