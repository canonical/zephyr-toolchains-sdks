name: zephyr-amd64
version: "1.0.1"
build-base: ubuntu@24.04
summary: Zephyr Toolchain
description: |
  This SDK provides the x86_64 cross-compiler toolchain for building Zephyr
  firmware targeting the x86_64-zephyr-elf target triple. Use this SDK
  alongside the zephyr base SDK.
license: Apache-2.0
website: https://github.com/canonical/zephyr-amd64-sdk
platforms:
  amd64:

slots:
  toolchain:
    interface: mount
    workshop-source: $SDK
parts:
  toolchain:
    plugin: dump
    source: https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v$CRAFT_PROJECT_VERSION/toolchain_gnu_linux-x86_64_x86_64-zephyr-elf.tar.xz
    source-type: tar
