summary: Verify arm-zephyr-eabi cross-compiler binaries are present in the SDK

prepare: |
  envsubst '${BASE}' <workshop.yaml.in >workshop.yaml
  workshop launch

restore: |
  workshop remove || true

execute: |
  # The cross-compiler and the binutils a Zephyr build relies on must be
  # present and executable inside the packed SDK.
  workshop exec -- test -x /var/lib/workshop/sdk/zephyr-arm/bin/arm-zephyr-eabi-gcc
  workshop exec -- test -x /var/lib/workshop/sdk/zephyr-arm/bin/arm-zephyr-eabi-g++
  workshop exec -- test -x /var/lib/workshop/sdk/zephyr-arm/bin/arm-zephyr-eabi-ld
  workshop exec -- test -x /var/lib/workshop/sdk/zephyr-arm/bin/arm-zephyr-eabi-as
  workshop exec -- test -x /var/lib/workshop/sdk/zephyr-arm/bin/arm-zephyr-eabi-objcopy
  # The compiler must actually run.
  workshop exec -- /var/lib/workshop/sdk/zephyr-arm/bin/arm-zephyr-eabi-gcc --version

debug: |
  workshop exec -- ls /var/lib/workshop/sdk/zephyr-arm/bin/ | head -20 || true
