name: zephyr-arm
version: "0.16.9"
build-base: ubuntu@24.04
summary: Zephyr Toolchain
description: |
  This SDK provides the ARM cross-compiler toolchain for building Zephyr
  firmware targeting the arm-zephyr-eabi target triple. Use this SDK
  alongside the zephyr base SDK.
license: Apache-2.0
website: https://github.com/canonical/zephyr-arm-sdk
platforms:
  amd64:

slots:
  toolchain:
    interface: mount
    workshop-source: $SDK
parts:
  toolchain:
    plugin: dump
    source: https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v$CRAFT_PROJECT_VERSION/toolchain_linux-x86_64_arm-zephyr-eabi.tar.xz
    source-type: tar
